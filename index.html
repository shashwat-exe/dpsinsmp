<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DPSIN SMP</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="icon" href="server-icon.png">
    <style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}
body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    background:
    radial-gradient(circle at top left,#2563eb 0%,transparent 35%),
    radial-gradient(circle at bottom right,#7c3aed 0%,transparent 35%),
    #070b14;
    color:white;
}
.card{
    width:100%;
    max-width:500px;
    backdrop-filter:blur(20px);
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:28px;
    padding:30px;
    box-shadow:
    0 20px 60px rgba(0,0,0,.4),
    inset 0 1px rgba(255,255,255,.08);
}
.header{
    display:flex;
    align-items:center;
    gap:16px;
}
.server-icon{
    width:72px;
    height:72px;
    background:none;
    border:none;
    box-shadow:none;
    overflow:visible;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.5rem;
}
.server-icon img{
    width:100%;
    height:100%;
    object-fit:contain;
}
.server-name{
    font-size:1.5rem;
    font-weight:800;
}
.subtitle{
    color:#94a3b8;
    margin-top:4px;
}
.status-pill{
    margin-top:22px;
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding:10px 16px;
    border-radius:999px;
    font-size:.9rem;
    font-weight:600;
}
.online{
    background:rgba(34,197,94,.15);
    color:#4ade80;
}
.offline{
    background:rgba(239,68,68,.15);
    color:#f87171;
}
.stats{
    margin-top:24px;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
}
.stat{
    background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.05);
    padding:16px;
    border-radius:18px;
}
.label{
    color:#94a3b8;
    font-size:.85rem;
}
.value{
    margin-top:6px;
    font-size:1.15rem;
    font-weight:700;
}
.ip-box{
    margin-top:20px;
    display:flex;
    gap:10px;
}
.ip{
    flex:1;
    background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.05);
    border-radius:14px;
    padding:14px;
    color:#cbd5e1;
    overflow:hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}
.copy-btn{
    border:none;
    border-radius:14px;
    padding:14px 18px;
    cursor:pointer;
    font-weight:600;
    color:white;
    background:linear-gradient(135deg,#2563eb,#7c3aed);
}
.discord-btn{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    margin-top:14px;
    padding:14px;
    border-radius:16px;
    background:linear-gradient(135deg,#5865F2,#4752C4);
    color:white;
    text-decoration:none;
    font-weight:700;
    font-size:0.95rem;
    box-shadow: 0 4px 15px rgba(88, 101, 242, 0.2);
    transition: transform 0.2s ease, background 0.2s ease;
}
.discord-btn:hover{
    transform: translateY(-2px);
    background:linear-gradient(135deg,#6A77F3,#5865F2);
}
.player-card{
    margin-top:14px;
}
.player-tags{
    margin-top:10px;
    display:flex;
    flex-wrap:wrap;
    gap:8px;
}
.player-tag{
    padding:7px 12px;
    border-radius:999px;
    background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.05);
    color:#e2e8f0;
    font-size:.9rem;
}
.footer{
    margin-top:18px;
    color:#64748b;
    font-size:.8rem;
    text-align:center;
}
</style>
</head>
<body>
<div class="card">
<div class="header">
    <div class="server-icon" id="icon">
        ⛏️
    </div>
    <div>
        <div class="server-name">DPSIN SMP</div>
        <div class="subtitle">Minecraft Java Edition</div>
    </div>
</div>
<div id="status"></div>
<div class="stats">
    <div class="stat">
        <div class="label">Players</div>
        <div class="value" id="players">--</div>
    </div>
    <div class="stat">
        <div class="label">Version</div>
        <div class="value" id="version">--</div>
    </div>
</div>
<div class="stat player-card">
    <div class="label">Online Players</div>
    <div id="playerlist" class="player-tags">
        Loading...
    </div>
</div>
<div class="ip-box">
    <div class="ip">141.148.217.211:25502</div>
    <button class="copy-btn" onclick="copyIP()">Copy</button>
</div>

<a href="https://discord.gg/ppCaVm5Mtb" target="_blank" class="discord-btn">
     Click to Join the SMP Discord! 
</a>

<div class="footer">
    DPSIN SMP • Auto updates every 30 seconds<br><br>

    Owned and Managed by
    <a href="https://discord.com/users/560415089686216704"
       target="_blank"
       style="
       color:#60a5fa;
       text-decoration:none;
       font-weight:700;">
       shashwat
    </a>
</div>
</div>
<script>
const SERVER = "141.148.217.211:25502";

async function updateStatus() {
    try {
        const res = await fetch(`https://api.mcstatus.io/v2/status/java/${SERVER}`);
        const data = await res.json();
        
        if(data.online){
            document.getElementById("status").innerHTML = `
                <div class="status-pill online">
                    🟢 Online
                </div>
            `;            
            document.getElementById("players").textContent = `${data.players.online}/${data.players.max}`;
            document.getElementById("version").textContent = data.version.name_clean || "Unknown";
            
            if(data.icon){
                document.getElementById("icon").innerHTML = `<img src="${data.icon}" alt="Server Icon">`;
            }
            
            const playerList = document.getElementById("playerlist");
            if(data.players && data.players.list && data.players.list.length > 0){
                playerList.innerHTML = data.players.list
                    .map(player => `<div class="player-tag">${player.name}</div>`)
                    .join("");
            } else {
                playerList.innerHTML = `<div style="color:#64748b">Player list hidden</div>`;            
            }
        } else {
            document.getElementById("status").innerHTML = `
                <div class="status-pill offline">
                    🔴 Offline
                </div>
            `;            
            document.getElementById("players").textContent = "--";
            document.getElementById("version").textContent = "--";
            document.getElementById("playerlist").innerHTML = "--";
        }
    } catch(err){
        console.error(err);
        document.getElementById("status").innerHTML = `
            <div class="status-pill offline">
                ⚠️ Connection Error
            </div>
        `;        
        document.getElementById("players").textContent = "--";
        document.getElementById("version").textContent = "--";
        document.getElementById("playerlist").innerHTML = "--";
    }
}

function copyIP(){
    navigator.clipboard.writeText(SERVER);
    const btn = document.querySelector(".copy-btn");
    btn.textContent = "Copied!";
    setTimeout(() => {
        btn.textContent = "Copy";
    }, 1500);
}

updateStatus();
setInterval(updateStatus, 30000);
</script>
</body>
</html>
