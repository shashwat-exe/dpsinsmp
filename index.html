<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DPSIN SMP</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
}

body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
    background: 
        radial-gradient(circle at 10% 10%, rgba(37, 99, 235, 0.15) 0%, transparent 45%),
        radial-gradient(circle at 90% 90%, rgba(124, 58, 237, 0.15) 0%, transparent 45%),
        #0b0f19;
    color: #f8fafc;
}

.card {
    width: 100%;
    max-width: 460px;
    background: rgba(13, 20, 35, 0.65);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 24px;
    padding: 28px;
    box-shadow: 
        0 4px 6px -1px rgba(0, 0, 0, 0.1),
        0 24px 48px -12px rgba(0, 0, 0, 0.5),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
}

/* Header adjusted to keep status pill neatly aligned on the right side */
.header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding-bottom: 20px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.06);
}

.header-left {
    display: flex;
    align-items: center;
    gap: 14px;
}

.server-icon {
    width: 54px;
    height: 54px;
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.8rem;
    overflow: hidden;
}

.server-icon img {
    width: 100%;
    height: 100%;
    object-fit: contain;
}

.server-name {
    font-size: 1.25rem;
    font-weight: 800;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, #fff 60%, #cbd5e1);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.subtitle {
    color: #64748b;
    font-size: 0.85rem;
    font-weight: 500;
    margin-top: 2px;
}

/* Redesigned minimal status pill */
.status-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border-radius: 999px;
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 0.02em;
    border: 1px solid transparent;
}

.status-pill.online {
    background: rgba(34, 197, 94, 0.1);
    color: #4ade80;
    border-color: rgba(34, 197, 94, 0.15);
}

.status-pill.offline {
    background: rgba(239, 68, 68, 0.1);
    color: #f87171;
    border-color: rgba(239, 68, 68, 0.15);
}

.stats {
    margin-top: 20px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
}

.stat {
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid rgba(255, 255, 255, 0.04);
    padding: 14px 16px;
    border-radius: 16px;
}

.label {
    color: #64748b;
    font-size: 0.8rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
}

.value {
    margin-top: 4px;
    font-size: 1.2rem;
    font-weight: 700;
    color: #f1f5f9;
}

.player-card {
    margin-top: 12px;
}

.player-tags {
    margin-top: 10px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
}

.player-tag {
    padding: 5px 10px;
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.04);
    color: #cbd5e1;
    font-size: 0.85rem;
    font-weight: 500;
}

.ip-box {
    margin-top: 20px;
    display: flex;
    gap: 8px;
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid rgba(255, 255, 255, 0.04);
    border-radius: 14px;
    padding: 6px;
}

.ip {
    flex: 1;
    display: flex;
    align-items: center;
    padding-left: 12px;
    color: #94a3b8;
    font-size: 0.9rem;
    font-family: monospace;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}

.copy-btn {
    border: none;
    border-radius: 10px;
    padding: 10px 16px;
    cursor: pointer;
    font-weight: 600;
    font-size: 0.85rem;
    color: white;
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.05);
    transition: all 0.2s ease;
}

.copy-btn:hover {
    background: rgba(255, 255, 255, 0.15);
    color: #fff;
}

.discord-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 12px;
    padding: 14px;
    border-radius: 14px;
    background: linear-gradient(135deg, #4f46e5, #7c3aed);
    color: white;
    text-decoration: none;
    font-weight: 600;
    font-size: 0.9rem;
    box-shadow: 0 4px 12px rgba(124, 58, 237, 0.25);
    transition: all 0.2s ease;
}

.discord-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(124, 58, 237, 0.35);
    filter: brightness(1.1);
}

.footer {
    margin-top: 24px;
    color: #475569;
    font-size: 0.75rem;
    text-align: center;
    font-weight: 500;
}

.footer a {
    color: #3b82f6;
    text-decoration: none;
    font-weight: 600;
    transition: color 0.2s ease;
}

.footer a:hover {
    color: #60a5fa;
}
</style>
</head>
<body>

<div class="card">
    <div class="header">
        <div class="header-left">
            <div class="server-icon" id="icon">⛏️</div>
            <div>
                <div class="server-name">DPSIN SMP</div>
                <div class="subtitle">Minecraft Java Edition</div>
            </div>
        </div>
        <div id="status"></div>
    </div>

    <div class="stats">
        <div class="stat">
            <div class="label">Players</div>
            <div class="value" id="players">--</div>
        </div>
        <div class="stat">
            <div class="label">Version</div>
            <div class="value" id="version">--</div>
        </div>
    </div>

    <div class="stat player-card">
        <div class="label">Online Players</div>
        <div id="playerlist" class="player-tags">
            Loading...
        </div>
    </div>

    <div class="ip-box">
        <div class="ip">141.148.217.211:25502</div>
        <button class="copy-btn" onclick="copyIP()">Copy</button>
    </div>

    <a href="https://discord.gg/ppCaVm5Mtb" target="_blank" class="discord-btn">
        💬 Join the Discord Server
    </a>

    <div class="footer">
        Owned and Managed by
        <a href="https://discord.com/users/560415089686216704" target="_blank">shashwat</a>
    </div>
</div>

<script>
const SERVER = "141.148.217.211:25502";

async function updateStatus() {
    try {
        const res = await fetch(`https://api.mcstatus.io/v2/status/java/${SERVER}`);
        const data = await res.json();
        
        if(data.online){
            document.getElementById("status").innerHTML = `
                <div class="status-pill online">
                    Online
                </div>
            `;            
            document.getElementById("players").textContent = `${data.players.online}/${data.players.max}`;
            document.getElementById("version").textContent = data.version.name_clean || "Unknown";
            
            if(data.icon){
                document.getElementById("icon").innerHTML = `<img src="${data.icon}" alt="Server Icon">`;
            }
            
            const playerList = document.getElementById("playerlist");
            if(data.players && data.players.list && data.players.list.length > 0){
                playerList.innerHTML = data.players.list
                    .map(player => `<div class="player-tag">${player.name}</div>`)
                    .join("");
            } else {
                playerList.innerHTML = `<div style="color:#475569; font-size:0.85rem">Player list hidden</div>`;            
            }
        } else {
            document.getElementById("status").innerHTML = `
                <div class="status-pill offline">
                    Offline
                </div>
            `;            
            document.getElementById("players").textContent = "--";
            document.getElementById("version").textContent = "--";
            document.getElementById("playerlist").innerHTML = "--";
        }
    } catch(err){
        console.error(err);
        document.getElementById("status").innerHTML = `
            <div class="status-pill offline">
                Error
            </div>
        `;        
        document.getElementById("players").textContent = "--";
        document.getElementById("version").textContent = "--";
        document.getElementById("playerlist").innerHTML = "--";
    }
}

function copyIP(){
    navigator.clipboard.writeText(SERVER);
    const btn = document.querySelector(".copy-btn");
    btn.textContent = "Copied!";
    setTimeout(() => {
        btn.textContent = "Copy";
    }, 1500);
}

updateStatus();
setInterval(updateStatus, 30000);
</script>
</body>
</html>
